type: object
properties:
  name:
    type: string
    minLength: 2
    maxLength: 100
  tagline:
    type: string
    maxLength: 160
  description:
    type: string
    maxLength: 1000
  about:
    type: string
    maxLength: 5000
    description: Long-form markdown pitch shown on the Overview tab
  video_url:
    type: string
    maxLength: 500
    description: YouTube URL embedded on the Overview tab
  milestones:
    type: string
    maxLength: 20000
    description: 'JSON object: {"items":[{"text","link","category"}],"achieved":n}'
  website:
    type: string
  stage:
    $ref: ./Stage.yaml
  industry:
    $ref: ./Industry.yaml
  team_size:
    type: integer
  location:
    type: string
  founded_year:
    type: integer
  tech_stack:
    type: string
  product_links:
    type: string
  gallery:
    type: string
    description: JSON-encoded array of product screenshot URLs (max 4)
  product_status:
    type: string
    maxLength: 20
    description: 'Launch status: coming-soon | waitlist | beta | live (empty = none)'
  features:
    type: string
    maxLength: 4000
    description: 'JSON-encoded array of key product features: [{"title","description"}]'
  linkedin:
    type: string
  twitter:
    type: string
  github:
    type: string
  instagram:
    type: string
  is_raising:
    type: boolean
  current_round:
    $ref: ./FundingRound.yaml
  funding_ask:
    type: string
  funding_use:
    type: string
  is_hiring:
    type: boolean
  open_roles:
    type: string
  contributing_text:
    type: string
    description: Markdown describing how to contribute
  contact_general:
    type: string
  contact_funding:
    type: string
  contact_talent:
    type: string
  profile_setup:
    type: boolean
    description: Set to true to mark the profile as complete and visible in public listings
  founders:
    type: string
    description: JSON-encoded array of founders ({name, photo_url, linkedin})
