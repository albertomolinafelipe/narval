type: object
properties:
  name:
    type: string
    minLength: 2
    maxLength: 100
  tagline:
    type: string
    maxLength: 160
  description:
    type: string
    maxLength: 1000
  website:
    type: string
  stage:
    $ref: ./Stage.yaml
  industry:
    $ref: ./Industry.yaml
  team_size:
    type: integer
  location:
    type: string
  founded_year:
    type: integer
  tech_stack:
    type: string
  product_links:
    type: string
  linkedin:
    type: string
  twitter:
    type: string
  github:
    type: string
  instagram:
    type: string
  is_raising:
    type: boolean
  current_round:
    $ref: ./FundingRound.yaml
  funding_ask:
    type: string
  funding_use:
    type: string
  is_hiring:
    type: boolean
  open_roles:
    type: string
  contributing_text:
    type: string
    description: Markdown describing how to contribute
  contact_general:
    type: string
  contact_funding:
    type: string
  contact_talent:
    type: string
  profile_setup:
    type: boolean
    description: Set to true to mark the profile as complete and visible in public listings
