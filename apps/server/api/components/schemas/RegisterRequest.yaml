type: object
required:
  - account_type
  - email
properties:
  account_type:
    $ref: ./AccountType.yaml
  email:
    type: string
    format: email
  # For account_type = "user":
  nickname:
    type: string
    minLength: 2
    maxLength: 50
    description: Required when account_type is "user"
  # For account_type = "startup":
  name:
    type: string
    minLength: 2
    maxLength: 100
    description: >-
      Required when account_type is "startup". Startups register with a plain
      email and verify their domain later from the profile.
