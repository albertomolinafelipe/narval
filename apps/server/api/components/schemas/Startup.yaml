type: object
required:
  - id
  - name
  - owner_id
  - created_at
properties:
  id:
    type: string
    format: uuid
  name:
    type: string
  tagline:
    type: string
  description:
    type: string
  about:
    type: string
    description: Long-form markdown pitch shown on the Overview tab
  video_url:
    type: string
    description: YouTube URL embedded on the Overview tab
  milestones:
    type: string
    description: 'JSON object: {"items":[{"text","link","category"}],"achieved":n} shown on the Overview tab'
  website:
    type: string
  verified_domain:
    type: string
    description: Verified domain (read-only, set at verification; empty if unverified)
  instagram_verified:
    type: boolean
    description: >-
      Whether the current Instagram handle has been verified via DM. Read-only;
      set at verification and cleared automatically if the handle is edited.
  logo_url:
    type: string
  stage:
    $ref: ./Stage.yaml
  industry:
    $ref: ./Industry.yaml
  team_size:
    type: integer
  location:
    type: string
  founded_year:
    type: integer
  tech_stack:
    type: string
  banner_image:
    type: string
    description: URL of the banner image
  product_links:
    type: string
    description: 'JSON object with product links: {"web":"...","ios":"...","android":"..."}'
  gallery:
    type: string
    description: 'JSON array of vertical product screenshot URLs (max 4): ["url1","url2"]'
  product_status:
    type: string
    description: 'Launch status shown on the Product tab: coming-soon | waitlist | beta | live (empty = none)'
  features:
    type: string
    description: 'JSON array of key product features shown on the Product tab: [{"title","description"}]'
  linkedin:
    type: string
  twitter:
    type: string
  github:
    type: string
  instagram:
    type: string
  is_raising:
    type: boolean
  current_round:
    $ref: ./FundingRound.yaml
  funding_ask:
    type: string
  funding_use:
    type: string
  is_hiring:
    type: boolean
  open_roles:
    type: string
    description: Comma-separated list of open roles
  contributing_text:
    type: string
    description: Markdown describing how to contribute
  contact_general:
    type: string
  contact_funding:
    type: string
  contact_talent:
    type: string
  owner_id:
    type: string
  profile_setup:
    type: boolean
    description: Whether the startup profile has been fully set up (defaults to false)
  created_at:
    type: string
    format: date-time
  updated_at:
    type: string
    format: date-time
  is_favorited:
    type: boolean
    description: >-
      Whether the current authenticated user has favorited this startup (only
      present when authenticated)
  verified:
    type: boolean
    description: >-
      Whether the startup registered via the domain+work-email path
  boost_count:
    type: integer
    description: >-
      Total number of active boosts for this startup (boosts expire after 7
      days)
  has_boosted:
    type: boolean
    description: >-
      Whether the current authenticated user has an active boost for this
      startup (only present when authenticated)
  founders:
    type: array
    items:
      $ref: ./Founder.yaml
