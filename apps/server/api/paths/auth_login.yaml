post:
  operationId: login
  summary: Begin passwordless login — sends a verification code
  requestBody:
    required: true
    content:
      application/json:
        schema:
          $ref: ../components/schemas/LoginRequest.yaml
  responses:
    '202':
      description: Verification code sent; proceed to /auth/verify
    '400':
      description: Validation error
      content:
        application/json:
          schema:
            $ref: ../components/schemas/Error.yaml
    '404':
      description: No account with this email
      content:
        application/json:
          schema:
            $ref: ../components/schemas/Error.yaml
    '429':
      description: Too many verification-code requests; retry later
      content:
        application/json:
          schema:
            $ref: ../components/schemas/Error.yaml
