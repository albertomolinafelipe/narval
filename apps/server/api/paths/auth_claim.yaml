post:
  operationId: startClaim
  summary: Begin claiming an admin-seeded shell — sends a verification code
  description: >-
    Validates the claim token and emails an OTP to the given address.
    /auth/verify completes the claim and reassigns ownership of the shell.
    Works for brand-new emails and existing accounts alike.
  requestBody:
    required: true
    content:
      application/json:
        schema:
          $ref: ../components/schemas/StartClaimRequest.yaml
  responses:
    '202':
      description: Verification code sent; proceed to /auth/verify
    '400':
      description: Validation error
      content:
        application/json:
          schema:
            $ref: ../components/schemas/Error.yaml
    '404':
      description: Claim link invalid or already used
      content:
        application/json:
          schema:
            $ref: ../components/schemas/Error.yaml
    '409':
      description: Email already owns a startup profile
      content:
        application/json:
          schema:
            $ref: ../components/schemas/Error.yaml
    '429':
      description: Too many verification-code requests; retry later
      content:
        application/json:
          schema:
            $ref: ../components/schemas/Error.yaml
