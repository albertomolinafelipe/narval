get:
  operationId: listStartups
  summary: List all startup accounts (public)
  parameters:
    - name: favorited
      in: query
      description: When true, return only startups favorited by the authenticated user (requires auth).
      required: false
      schema:
        type: boolean
    - name: sort
      in: query
      description: Sort order for the list.
      required: false
      schema:
        type: string
        enum:
          - recent
          - trending
        default: recent
  responses:
    '200':
      description: List of startups
      content:
        application/json:
          schema:
            type: array
            items:
              $ref: ../components/schemas/Startup.yaml
post:
  operationId: createStartup
  summary: Create a new startup account
  security:
    - bearerAuth: []
  requestBody:
    required: true
    content:
      application/json:
        schema:
          $ref: ../components/schemas/CreateStartupRequest.yaml
  responses:
    '201':
      description: Startup created
      content:
        application/json:
          schema:
            $ref: ../components/schemas/Startup.yaml
    '400':
      description: Validation error
      content:
        application/json:
          schema:
            $ref: ../components/schemas/Error.yaml
    '401':
      description: Unauthorized
      content:
        application/json:
          schema:
            $ref: ../components/schemas/Error.yaml
    '409':
      description: Startup name already taken
      content:
        application/json:
          schema:
            $ref: ../components/schemas/Error.yaml
