post:
  operationId: verify
  summary: Verify the emailed code and create the account and session
  description: >-
    Consumes the OTP for registration, login, and claim flows alike. On success
    a SuperTokens session cookie is set.
  requestBody:
    required: true
    content:
      application/json:
        schema:
          $ref: ../components/schemas/VerifyRequest.yaml
  responses:
    '200':
      description: Verified and logged in
      content:
        application/json:
          schema:
            $ref: ../components/schemas/UserProfile.yaml
    '400':
      description: Validation error, or the stashed claim link is invalid
      content:
        application/json:
          schema:
            $ref: ../components/schemas/Error.yaml
    '401':
      description: Invalid or expired verification code
      content:
        application/json:
          schema:
            $ref: ../components/schemas/Error.yaml
    '409':
      description: Account already has a startup profile
      content:
        application/json:
          schema:
            $ref: ../components/schemas/Error.yaml
