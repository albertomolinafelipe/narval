get:
  operationId: getClaimLink
  summary: Get the claim token for a startup shell (owner only)
  description: >-
    Lets the admin (re)copy the claim link from the edit page. The token is
    empty once the profile has been claimed.
  security:
    - bearerAuth: []
  parameters:
    - name: id
      in: path
      required: true
      schema:
        type: string
        format: uuid
  responses:
    '200':
      description: Claim link state
      content:
        application/json:
          schema:
            $ref: ../components/schemas/ClaimLinkResponse.yaml
    '401':
      description: Unauthorized
      content:
        application/json:
          schema:
            $ref: ../components/schemas/Error.yaml
    '403':
      description: Forbidden – not the owner
      content:
        application/json:
          schema:
            $ref: ../components/schemas/Error.yaml
    '404':
      description: Startup not found
      content:
        application/json:
          schema:
            $ref: ../components/schemas/Error.yaml
