get:
  operationId: listInstagramVerifications
  summary: List Instagram verifications for the admin console
  security:
    - adminAuth: []
  parameters:
    - name: status
      in: query
      description: Filter by status. Omit to return all.
      required: false
      schema:
        type: string
        enum:
          - pending
          - verified
  responses:
    '200':
      description: List of verifications
      content:
        application/json:
          schema:
            type: array
            items:
              $ref: ../components/schemas/AdminInstagramVerification.yaml
    '401':
      description: Unauthorized
      content:
        application/json:
          schema:
            $ref: ../components/schemas/Error.yaml
    '403':
      description: Admin access required
      content:
        application/json:
          schema:
            $ref: ../components/schemas/Error.yaml
