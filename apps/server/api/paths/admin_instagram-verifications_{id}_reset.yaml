post:
  operationId: resetInstagramVerification
  summary: Reset a verification, unlocking the handle (admin only)
  security:
    - bearerAuth: []
  parameters:
    - name: id
      in: path
      description: The verification id.
      required: true
      schema:
        type: string
        format: uuid
  responses:
    '204':
      description: Verification cleared; the startup can lock a new handle
    '401':
      description: Unauthorized
      content:
        application/json:
          schema:
            $ref: ../components/schemas/Error.yaml
    '403':
      description: Admin access required
      content:
        application/json:
          schema:
            $ref: ../components/schemas/Error.yaml
    '404':
      description: Verification not found
      content:
        application/json:
          schema:
            $ref: ../components/schemas/Error.yaml
