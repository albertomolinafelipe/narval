post:
  operationId: confirmInstagramVerification
  summary: Confirm a startup's Instagram after matching the DM (admin only)
  security:
    - adminAuth: []
  parameters:
    - name: id
      in: path
      description: The verification id.
      required: true
      schema:
        type: string
        format: uuid
  responses:
    '200':
      description: Verification confirmed; the startup's Instagram is now verified
      content:
        application/json:
          schema:
            $ref: ../components/schemas/AdminInstagramVerification.yaml
    '401':
      description: Unauthorized
      content:
        application/json:
          schema:
            $ref: ../components/schemas/Error.yaml
    '403':
      description: Admin access required
      content:
        application/json:
          schema:
            $ref: ../components/schemas/Error.yaml
    '404':
      description: Verification not found
      content:
        application/json:
          schema:
            $ref: ../components/schemas/Error.yaml
