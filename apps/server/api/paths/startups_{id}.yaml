get:
  operationId: getStartup
  summary: Get a startup by ID (public)
  parameters:
    - name: id
      in: path
      required: true
      schema:
        type: string
        format: uuid
  responses:
    '200':
      description: Startup found
      content:
        application/json:
          schema:
            $ref: ../components/schemas/Startup.yaml
    '404':
      description: Startup not found
      content:
        application/json:
          schema:
            $ref: ../components/schemas/Error.yaml
put:
  operationId: updateStartup
  summary: Update the authenticated user's startup profile
  security:
    - bearerAuth: []
  parameters:
    - name: id
      in: path
      required: true
      schema:
        type: string
        format: uuid
  requestBody:
    required: true
    content:
      application/json:
        schema:
          $ref: ../components/schemas/UpdateStartupRequest.yaml
  responses:
    '200':
      description: Startup updated
      content:
        application/json:
          schema:
            $ref: ../components/schemas/Startup.yaml
    '400':
      description: Validation error
      content:
        application/json:
          schema:
            $ref: ../components/schemas/Error.yaml
    '401':
      description: Unauthorized
      content:
        application/json:
          schema:
            $ref: ../components/schemas/Error.yaml
    '403':
      description: Forbidden – not the owner
      content:
        application/json:
          schema:
            $ref: ../components/schemas/Error.yaml
    '404':
      description: Startup not found
      content:
        application/json:
          schema:
            $ref: ../components/schemas/Error.yaml
