services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: narval
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: narval
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: [CMD-SHELL, pg_isready -U narval]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    volumes:
      - redis_data:/data
    healthcheck:
      test: [CMD, redis-cli, ping]
      interval: 5s
      timeout: 5s
      retries: 5

  minio:
    image: minio/minio:latest
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    volumes:
      - minio_data:/data
    healthcheck:
      test: [CMD-SHELL, curl -f http://localhost:9000/minio/health/live || exit 1]
      interval: 10s
      timeout: 5s
      retries: 5

  minio-init:
    image: minio/mc:latest
    restart: on-failure
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: /bin/sh -c "
      mc alias set local http://minio:9000 ${MINIO_ROOT_USER} ${MINIO_ROOT_PASSWORD} &&
      mc mb --ignore-existing local/narval &&
      mc anonymous set public local/narval
      "

  supertokens-init:
    image: postgres:16-alpine
    restart: on-failure
    depends_on:
      postgres:
        condition: service_healthy
    entrypoint: [/bin/sh, -c]
    command:
      - |
        PGPASSWORD=${POSTGRES_PASSWORD} psql -h postgres -U narval -d narval -tc "SELECT 1 FROM pg_database WHERE datname = 'supertokens'" | grep -q 1 ||
        PGPASSWORD=${POSTGRES_PASSWORD} psql -h postgres -U narval -d narval -c "CREATE DATABASE supertokens"

  supertokens:
    image: registry.supertokens.io/supertokens/supertokens-postgresql:9.2
    restart: unless-stopped
    environment:
      POSTGRESQL_HOST: postgres
      POSTGRESQL_PORT: 5432
      POSTGRESQL_DATABASE_NAME: supertokens
      POSTGRESQL_USER: narval
      POSTGRESQL_PASSWORD: ${POSTGRES_PASSWORD}
    depends_on:
      postgres:
        condition: service_healthy
      supertokens-init:
        condition: service_completed_successfully
    healthcheck:
      test: [CMD, curl, -f, http://localhost:3567/hello]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  umami-init:
    image: postgres:16-alpine
    restart: on-failure
    depends_on:
      postgres:
        condition: service_healthy
    entrypoint: [/bin/sh, -c]
    command:
      - |
        PGPASSWORD=${POSTGRES_PASSWORD} psql -h postgres -U narval -d narval -tc "SELECT 1 FROM pg_database WHERE datname = 'umami'" | grep -q 1 ||
        PGPASSWORD=${POSTGRES_PASSWORD} psql -h postgres -U narval -d narval -c "CREATE DATABASE umami"

  umami:
    image: ghcr.io/umami-software/umami:postgresql-latest
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql://narval:${POSTGRES_PASSWORD}@postgres:5432/umami
      DATABASE_TYPE: postgresql
      APP_SECRET: ${UMAMI_APP_SECRET}
      ADMIN_PASSWORD: ${UMAMI_ADMIN_PASSWORD}
    depends_on:
      postgres:
        condition: service_healthy
      umami-init:
        condition: service_completed_successfully
    healthcheck:
      test: [CMD-SHELL, curl -f http://localhost:3000/api/heartbeat || exit 1]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  server:
    image: ghcr.io/albertomolinafelipe/narval-server:latest
    restart: unless-stopped
    env_file: .env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
      supertokens:
        condition: service_healthy

  web:
    image: ghcr.io/albertomolinafelipe/narval-web:latest
    restart: unless-stopped
    env_file: .env
    depends_on:
      server:
        condition: service_started

  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - web
      - umami
      - minio

volumes:
  postgres_data:
  redis_data:
  minio_data:
  caddy_data:
  caddy_config:
