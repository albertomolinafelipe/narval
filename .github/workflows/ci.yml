name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: ["**"]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: apps/server/go.mod
          cache-dependency-path: apps/server/go.sum

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: apps/web/package-lock.json

      - name: Install web dependencies
        run: cd apps/web && npm ci

      - name: Lint Go
        uses: golangci/golangci-lint-action@v8
        with:
          version: v2.12
          working-directory: apps/server

      - name: Lint web
        run: cd apps/web && npm run lint

      - name: Check web formatting
        run: cd apps/web && npx prettier --check .

  generate-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: apps/server/go.mod
          cache-dependency-path: apps/server/go.sum

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: apps/web/package-lock.json

      - name: Install web dependencies
        run: cd apps/web && npm ci

      - run: make generate

      - name: Committed generated code must match the spec
        run: git diff --exit-code

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: apps/server/go.mod
          cache-dependency-path: apps/server/go.sum

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: apps/web/package-lock.json

      - name: Install web dependencies
        run: cd apps/web && npm ci

      - name: Run Go unit tests
        run: cd apps/server && go test -v -short ./...

      - name: Run web tests
        run: cd apps/web && npm run test

  integration:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: apps/server/go.mod
          cache-dependency-path: apps/server/go.sum

      - name: Run integration tests
        run: make test-integration

  test-build:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - run: make build

  build-server:
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push server image
        uses: docker/build-push-action@v6
        with:
          context: ./apps/server
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/narval-server:latest
            ghcr.io/${{ github.repository_owner }}/narval-server:${{ github.sha }}
          provenance: false
          cache-from: type=gha,scope=server
          cache-to: type=gha,scope=server,mode=max

  build-web:
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push web image
        uses: docker/build-push-action@v6
        with:
          context: ./apps/web
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/narval-web:latest
            ghcr.io/${{ github.repository_owner }}/narval-web:${{ github.sha }}
          build-args: |
            NEXT_PUBLIC_MAPBOX_TOKEN=${{ secrets.NEXT_PUBLIC_MAPBOX_TOKEN }}
            NEXT_PUBLIC_SITE_URL=https://gonarval.com
          provenance: false
          cache-from: type=gha,scope=web
          cache-to: type=gha,scope=web,mode=max

  deploy:
    needs: [lint, generate-check, test, integration, build-server, build-web]
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to droplet
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.DROPLET_IP }}
          username: root
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          command_timeout: 10m
          script: |
            echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin
            cd /opt/narval
            docker compose -f docker-compose.prod.yml pull
            docker compose -f docker-compose.prod.yml up -d --remove-orphans
